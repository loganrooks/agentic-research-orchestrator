name: Publish aro-installer (npm)

on:
  push:
    tags:
      - "aro-installer-v*"

permissions:
  contents: write
  id-token: write

concurrency:
  group: npm-publish-aro-installer-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Tests
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest
          pytest -q

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME}"
          EXPECTED_PREFIX="aro-installer-v"
          if [[ "${TAG}" != ${EXPECTED_PREFIX}* ]]; then
            echo "Unexpected tag format: ${TAG}"
            exit 1
          fi
          VERSION="${TAG#${EXPECTED_PREFIX}}"
          PKG_VERSION="$(node -p 'require("./integrations/npm/aro-installer/package.json").version')"
          if [[ "${VERSION}" != "${PKG_VERSION}" ]]; then
            echo "Tag version (${VERSION}) does not match package.json version (${PKG_VERSION})"
            exit 1
          fi

      - name: Publish
        working-directory: integrations/npm/aro-installer
        run: |
          npm publish --access public --provenance

      - name: Pack release artifact
        working-directory: integrations/npm/aro-installer
        run: |
          npm pack

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            integrations/npm/aro-installer/aro-installer-*.tgz
